name: Marketplace Analytics Tests

on:
  push:
    branches:
      - feat/marketplace-analytics
  pull_request:
    branches:
      - main

jobs:
  marketplace-analytics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run marketplace analytics tests
        run: npm run test:marketplace-analytics

      - name: Run buyer stats tests
        run: npm run test:buyer-stats

      - name: Run seller stats tests
        run: npm run test:seller-stats

      - name: Run extended marketplace tests
        run: npx vitest run tests/marketplace_extend_test.ts tests/marketplace_price_update_test.ts tests/marketplace_coverage_test.ts
