name: Protocol Treasury Tests
on:
  push:
    branches: [feat/protocol-treasury, main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run test:treasury
      - run: npm run test:treasury-edge
