name: Subscription Tier Tests
on:
  push:
    branches: [feat/subscription-tiers, main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run test:sub-tiers
      - run: npm run test:sub-tier-edge
