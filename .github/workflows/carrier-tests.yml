name: Carrier Management Tests

on:
  push:
    branches:
      - feat/carrier-management
  pull_request:
    branches:
      - main

jobs:
  carrier-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run carrier tests
        run: npm run test:carriers

      - name: Run plan tests
        run: npm run test:plans

      - name: Run balance tests
        run: npm run test:balances

      - name: Run seller stats tests
        run: npm run test:sellers

      - name: Run event replay tests
        run: npx vitest run tests/event_replay_test.ts tests/plan_activate_test.ts
