name: Billing Enhancement Tests

on:
  push:
    branches:
      - feat/billing-enhancements
  pull_request:
    branches:
      - main

jobs:
  billing-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run billing enhanced tests
        run: npm run test:billing-enhanced

      - name: Run billing flow tests
        run: npm run test:billing-flow

      - name: Run billing grace tests
        run: npm run test:billing-grace

      - name: Run multi-subscription tests
        run: npx vitest run tests/multi_subscription_test.ts
