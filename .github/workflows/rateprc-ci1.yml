name: fix: rate calculation precision CI 1
on: { push: { branches: [fix/rate-precision, main] }, pull_request: { branches: [main] } }
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm ci && npm run test:rateprc
