name: Marketplace V2 Tests

on:
  push:
    branches:
      - feat/data-marketplace-v2
  pull_request:
    branches:
      - main

jobs:
  marketplace-v2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run marketplace v2 tests
        run: npm run test:marketplace-v2

      - name: Run edge case tests
        run: npm run test:edge

      - name: Run lifecycle tests
        run: npm run test:lifecycle

      - name: Run carrier stats tests
        run: npx vitest run tests/carrier_stats_test.ts tests/network_summary_test.ts

      - name: Run subscription flow tests
        run: npx vitest run tests/subscription_flow_test.ts tests/billing_renewal_test.ts
