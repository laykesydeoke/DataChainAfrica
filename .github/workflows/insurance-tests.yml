name: Data Insurance Tests
on:
  push:
    branches: [feat/data-insurance, main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run test:insurance
      - run: npm run test:ins-edge
